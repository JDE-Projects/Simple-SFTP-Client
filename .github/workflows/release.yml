name: Release
on:
  push:
    tags: ['v*']
jobs:
  release:
    uses: JDE-Projects/Build-Tools/.github/workflows/release.yml@41745cdc5e4ff7416d18e1b51e408ee62c93849e # Build-Tools: installer support
    permissions:
      id-token: write
      attestations: write
      contents: write
    with:
      app_name: SimpleSFTPClient
      dist_subfolder: "Simple SFTP Client"
      python_version: "3.14"
      build_command: "Build_Simple_SFTP_Client.bat"
      app_id: "d0b54bb3-ab77-465f-be40-f4a9a001cc2e"   # stable installer GUID - generated once, never change
