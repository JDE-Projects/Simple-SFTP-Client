name: Release
run-name: Release ${{ github.ref_name }}   # else the run is titled by the tagged commit's message
on:
  push:
    tags: ['v*']
jobs:
  release:
    uses: JDE-Projects/Build-Tools/.github/workflows/release.yml@50c6357e33a5c715e4f55df9e366c9600cca0943 # Build-Tools main (CI checks: ruff, import, pytest)
    permissions:
      id-token: write
      attestations: write
      contents: write
    with:
      app_name: SimpleSFTPClient
      dist_subfolder: "Simple SFTP Client"
      python_version: "3.14"
      build_command: "Build_Simple_SFTP_Client.bat"
      app_id: "d0b54bb3-ab77-465f-be40-f4a9a001cc2e"   # stable installer GUID - generated once, never change
      entry_script: "simple_sftp_client.py"
